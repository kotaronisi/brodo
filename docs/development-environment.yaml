    name: windows
    status: decided
  supported_os:
    - windows
  future_os:
    - linux

toolchain:
  language:
    name: cpp
    status: proposed
  cpp_standard:
    value: c++20
    status: proposed
  build_system:
    name: cmake
    status: proposed
  windows_compiler:
    name: msvc
    status: proposed
