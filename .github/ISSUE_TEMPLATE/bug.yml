name: Bug
description: Report a bug or defect
title: "fix: "
labels:
  - "type: bug"
  - "status: triage"
  - "priority: medium"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide concrete reproduction steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this issue to be complete?
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Optional. What should not be handled in this issue?
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
    validations:
      required: false
