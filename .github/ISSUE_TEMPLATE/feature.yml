name: Feature
description: Propose a new feature or enhancement
title: "feat: "
labels:
  - "type: feature"
  - "status: triage"
  - "priority: medium"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want to add or improve?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Who benefits from this and in what situation?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Behavior
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Optional, but recommended for feature issues.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
    validations:
      required: false
