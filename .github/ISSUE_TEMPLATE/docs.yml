name: Documentation
description: Propose a documentation change
title: "docs: "
labels:
  - "type: docs"
  - "status: triage"
  - "priority: medium"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What documentation should be added or changed?
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: Target Audience / Location
      description: Who is this for, and where should it be documented?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Optional. What should not be handled in this issue?
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
    validations:
      required: false
